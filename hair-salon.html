<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Salon tóc của Xoài - Game tạo kiểu tóc</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
      }

      body {
        font-family:
          ui-rounded, "Nunito", "Comic Sans MS", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #24324a;
        background:
          radial-gradient(circle at 10% 10%, rgba(255, 214, 90, 0.45), transparent 18rem),
          radial-gradient(circle at 86% 14%, rgba(125, 215, 207, 0.42), transparent 18rem),
          linear-gradient(135deg, #fff7dc 0%, #e9fbff 52%, #fff0f8 100%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.58;
      }

      .app {
        width: min(1180px, calc(100% - 28px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 22px 0 34px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 6px;
        font-size: clamp(2.15rem, 7vw, 5rem);
        line-height: 0.95;
      }

      h2 {
        margin-bottom: 10px;
        font-size: clamp(1.55rem, 4vw, 2.8rem);
        line-height: 1.05;
      }

      .eyebrow {
        margin-bottom: 6px;
        color: #5f6d87;
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .nav-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .nav-btn,
      .tool-btn,
      .chip,
      .primary {
        border: 0;
        font-weight: 900;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          filter 160ms ease;
      }

      .nav-btn,
      .tool-btn,
      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 48px;
        padding: 0 14px;
        border: 2px solid rgba(36, 50, 74, 0.12);
        border-radius: 18px;
        color: #24324a;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 12px 24px rgba(52, 87, 112, 0.11);
        text-decoration: none;
      }

      .primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 56px;
        padding: 0 22px;
        border-radius: 20px;
        color: #ffffff;
        background: linear-gradient(135deg, #f15c45, #ffb238);
        box-shadow: 0 16px 30px rgba(241, 92, 69, 0.24);
      }

      .nav-btn:hover,
      .tool-btn:hover,
      .chip:hover,
      .primary:hover {
        transform: translateY(-2px);
        filter: saturate(1.04);
      }

      .score-card {
        display: grid;
        place-items: center;
        min-width: 140px;
        padding: 12px 16px;
        border: 2px solid rgba(36, 50, 74, 0.12);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: 0 14px 30px rgba(52, 87, 112, 0.12);
        font-weight: 900;
      }

      .score-value {
        color: #f15c45;
        font-size: 2rem;
      }

      .screen {
        display: grid;
        grid-template-columns: minmax(310px, 0.78fr) minmax(360px, 1.1fr) minmax(300px, 0.82fr);
        gap: 16px;
        min-height: 720px;
        padding: clamp(16px, 2.4vw, 26px);
        border: 2px solid rgba(36, 50, 74, 0.12);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 24px 70px rgba(52, 87, 112, 0.16);
      }

      .panel,
      .salon-stage,
      .result-panel {
        border: 2px solid rgba(36, 50, 74, 0.1);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 16px 32px rgba(52, 87, 112, 0.1);
      }

      .panel {
        display: grid;
        align-content: start;
        gap: 16px;
        padding: 16px;
      }

      .salon-stage {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 14px;
        min-height: 650px;
        overflow: hidden;
        padding: 16px;
        background:
          linear-gradient(0deg, rgba(125, 215, 207, 0.34) 0 20%, transparent 20%),
          radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.82), transparent 9rem),
          linear-gradient(180deg, #e4fbff, #fff4c2);
      }

      .customer-card {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 3px solid rgba(241, 92, 69, 0.16);
        border-radius: 22px;
        background: rgba(255, 246, 203, 0.86);
      }

      .customer-head {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .customer-face {
        display: grid;
        place-items: center;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: #ffcf9d;
        box-shadow: inset 0 -8px 0 rgba(226, 137, 89, 0.2);
        font-size: 1.75rem;
      }

      .wish-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .wish-list li,
      .summary-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 40px;
        padding: 8px 10px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.76);
        font-weight: 900;
      }

      .tool-grid,
      .option-grid,
      .accessory-grid {
        display: grid;
        gap: 10px;
      }

      .tool-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .tool-btn {
        display: grid;
        min-height: 76px;
        padding: 10px;
        border-radius: 20px;
        text-align: center;
      }

      .tool-btn span,
      .chip span {
        font-size: 1.7rem;
        line-height: 1;
      }

      .tool-btn.is-active,
      .chip.is-active {
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.92);
        background: linear-gradient(135deg, #466789, #67d6c9);
        box-shadow: 0 16px 30px rgba(70, 103, 137, 0.2);
      }

      .option-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .accessory-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .chip {
        min-height: 58px;
        padding: 8px 10px;
        border-radius: 18px;
      }

      .color-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .color-btn {
        display: grid;
        place-items: center;
        aspect-ratio: 1;
        min-height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.9);
        border-radius: 18px;
        background: var(--swatch, #7a4b2d);
        box-shadow: 0 12px 22px rgba(52, 87, 112, 0.14);
      }

      .color-btn.is-active {
        outline: 4px solid rgba(241, 92, 69, 0.3);
        transform: translateY(-2px);
      }

      .mirror-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: #42627e;
        font-weight: 900;
      }

      .service-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .service-step {
        display: grid;
        place-items: center;
        min-height: 44px;
        padding: 6px 8px;
        border-radius: 14px;
        color: #42627e;
        background: rgba(255, 255, 255, 0.72);
        font-size: 0.92rem;
        font-weight: 900;
        text-align: center;
      }

      .service-step.is-done {
        color: #ffffff;
        background: #24a86a;
        box-shadow: 0 12px 20px rgba(36, 168, 106, 0.18);
      }

      .mirror {
        position: relative;
        display: grid;
        place-items: end center;
        min-height: 470px;
        overflow: hidden;
        border: 8px solid rgba(255, 255, 255, 0.86);
        border-radius: 44px;
        background:
          radial-gradient(circle at 28% 18%, rgba(255, 255, 255, 0.84), transparent 8rem),
          linear-gradient(180deg, #cdefff, #fff8df);
        box-shadow:
          inset 0 0 0 4px rgba(36, 50, 74, 0.08),
          0 20px 44px rgba(52, 87, 112, 0.18);
      }

      .avatar {
        position: relative;
        width: min(330px, 86%);
        height: 410px;
      }

      .neck {
        position: absolute;
        left: 50%;
        bottom: 104px;
        width: 58px;
        height: 78px;
        border: 5px solid #24324a;
        border-bottom: 0;
        border-radius: 24px 24px 0 0;
        background: #ffcf9d;
        transform: translateX(-50%);
      }

      .shoulders {
        position: absolute;
        left: 50%;
        bottom: 20px;
        width: 240px;
        height: 118px;
        border: 5px solid #24324a;
        border-radius: 54px 54px 38px 38px;
        background: #7dd7cf;
        transform: translateX(-50%);
      }

      .face {
        position: absolute;
        left: 50%;
        top: 118px;
        z-index: 5;
        width: 176px;
        height: 192px;
        border: 6px solid #24324a;
        border-radius: 47% 47% 52% 52%;
        background: #ffcf9d;
        transform: translateX(-50%);
        box-shadow: inset 0 -14px 0 rgba(226, 137, 89, 0.12);
      }

      .eye {
        position: absolute;
        top: 76px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #24324a;
      }

      .eye.left {
        left: 48px;
      }

      .eye.right {
        right: 48px;
      }

      .mouth {
        position: absolute;
        left: 50%;
        bottom: 42px;
        width: 48px;
        height: 24px;
        border-bottom: 6px solid #24324a;
        border-radius: 0 0 999px 999px;
        transform: translateX(-50%);
      }

      .hair-back,
      .hair-front,
      .bangs {
        position: absolute;
        left: 50%;
        z-index: 3;
        background: var(--hair-color, #6f3f27);
        transform: translateX(-50%);
        transition:
          height 260ms ease,
          width 260ms ease,
          border-radius 260ms ease,
          background 220ms ease,
          box-shadow 220ms ease;
      }

      .hair-back {
        top: 54px;
        width: 230px;
        height: var(--hair-height, 292px);
        border: 6px solid #24324a;
        border-radius: 46% 46% 44px 44px;
        box-shadow:
          inset -18px -18px 0 rgba(0, 0, 0, 0.08),
          0 18px 28px rgba(52, 87, 112, 0.12);
      }

      .hair-front {
        top: 70px;
        z-index: 7;
        width: 208px;
        height: 96px;
        border: 6px solid #24324a;
        border-bottom: 0;
        border-radius: 86px 86px 24px 24px;
      }

      .bangs {
        top: 108px;
        z-index: 8;
        width: 148px;
        height: 46px;
        border: 5px solid #24324a;
        border-top: 0;
        border-radius: 0 0 80px 80px;
        opacity: var(--bangs-opacity, 0);
      }

      .avatar[data-length="short"] {
        --hair-height: 202px;
      }

      .avatar[data-length="medium"] {
        --hair-height: 254px;
      }

      .avatar[data-length="long"] {
        --hair-height: 318px;
      }

      .avatar[data-style="wavy"] .hair-back,
      .avatar[data-style="wavy"] .hair-front {
        border-radius: 44% 44% 34% 34%;
        box-shadow:
          inset -16px -20px 0 rgba(0, 0, 0, 0.08),
          18px 10px 0 -8px var(--hair-color, #6f3f27),
          -18px 10px 0 -8px var(--hair-color, #6f3f27);
      }

      .avatar[data-style="curly"] .hair-back,
      .avatar[data-style="curly"] .hair-front {
        border-radius: 50%;
        box-shadow:
          inset -14px -16px 0 rgba(0, 0, 0, 0.08),
          22px 0 0 -8px var(--hair-color, #6f3f27),
          -22px 0 0 -8px var(--hair-color, #6f3f27),
          0 24px 0 -10px var(--hair-color, #6f3f27);
      }

      .avatar[data-style="straight"] .hair-back {
        border-radius: 92px 92px 34px 34px;
      }

      .accessory {
        position: absolute;
        left: var(--accessory-left, 50%);
        top: var(--accessory-top, 72px);
        z-index: 11;
        display: grid;
        place-items: center;
        width: 62px;
        height: 62px;
        border: 4px solid rgba(36, 50, 74, 0.12);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.78);
        font-size: 2.1rem;
        transform: translateX(-50%);
      }

      .sparkles {
        position: absolute;
        inset: 0;
        z-index: 12;
        pointer-events: none;
      }

      .sparkles span,
      .hair-snips span,
      .bubbles span,
      .dryer-wind span {
        position: absolute;
        display: grid;
        place-items: center;
      }

      .sparkles span {
        color: #ffd65a;
        font-size: 1.8rem;
        animation: sparkle-fall 760ms ease forwards;
      }

      .hair-snips span {
        color: var(--hair-color, #6f3f27);
        font-size: 1.4rem;
        animation: sparkle-fall 760ms ease forwards;
      }

      .bubbles,
      .dryer-wind {
        position: absolute;
        inset: 0;
        z-index: 13;
        pointer-events: none;
      }

      .bubbles span {
        width: 26px;
        height: 26px;
        border: 3px solid rgba(255, 255, 255, 0.94);
        border-radius: 50%;
        background: rgba(205, 239, 255, 0.42);
        animation: bubble-float 960ms ease forwards;
      }

      .dryer-wind span {
        width: 76px;
        height: 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 8px 18px rgba(63, 157, 214, 0.18);
        animation: wind-sweep 760ms ease forwards;
      }

      .avatar[data-washed="true"] .hair-front,
      .avatar[data-washed="true"] .hair-back,
      .avatar[data-dried="true"] .hair-front,
      .avatar[data-dried="true"] .hair-back {
        box-shadow:
          inset -18px -18px 0 rgba(0, 0, 0, 0.08),
          0 0 0 8px rgba(255, 255, 255, 0.12),
          0 18px 28px rgba(52, 87, 112, 0.12);
      }

      .result-panel {
        display: none;
        gap: 14px;
        padding: 16px;
      }

      .result-panel.is-open {
        display: grid;
      }

      .result-score {
        display: grid;
        place-items: center;
        min-height: 116px;
        border-radius: 24px;
        color: #ffffff;
        background: linear-gradient(135deg, #f15c45, #ffb238);
        box-shadow: 0 16px 30px rgba(241, 92, 69, 0.22);
        font-size: clamp(2.2rem, 8vw, 4rem);
        font-weight: 900;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .gallery-card {
        display: grid;
        place-items: center;
        min-height: 84px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.76);
        font-size: 1.8rem;
        font-weight: 900;
      }

      .feedback {
        min-height: 42px;
        color: #42627e;
        font-weight: 900;
        text-align: center;
      }

      @keyframes sparkle-fall {
        0% {
          opacity: 0;
          transform: translateY(-6px) scale(0.78) rotate(0deg);
        }

        20%,
        78% {
          opacity: 1;
        }

        100% {
          opacity: 0;
          transform: translateY(70px) scale(1.12) rotate(28deg);
        }
      }

      @keyframes bubble-float {
        0% {
          opacity: 0;
          transform: translateY(30px) scale(0.72);
        }

        20%,
        80% {
          opacity: 1;
        }

        100% {
          opacity: 0;
          transform: translateY(-76px) scale(1.18);
        }
      }

      @keyframes wind-sweep {
        0% {
          opacity: 0;
          transform: translateX(-80px) scaleX(0.7);
        }

        25%,
        76% {
          opacity: 1;
        }

        100% {
          opacity: 0;
          transform: translateX(110px) scaleX(1.1);
        }
      }

      @media (max-width: 980px) {
        .screen {
          grid-template-columns: 1fr;
        }

        .salon-stage {
          min-height: 620px;
        }
      }

      @media (max-width: 620px) {
        .app {
          width: min(100% - 16px, 560px);
          padding-top: 12px;
        }

        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .nav-actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .score-card {
          min-width: 0;
        }

        .screen {
          gap: 12px;
          padding: 12px;
          border-radius: 24px;
        }

        .panel,
        .salon-stage,
        .result-panel {
          border-radius: 22px;
        }

        .tool-grid,
        .option-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .service-strip {
          grid-template-columns: 1fr;
        }

        .color-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .mirror {
          min-height: 420px;
          border-radius: 28px;
        }

        .avatar {
          width: min(300px, 92%);
          transform: scale(0.9);
          transform-origin: bottom center;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <p class="eyebrow">Cho bé lớp 3</p>
          <h1>Salon tóc của Xoài</h1>
          <p>Bé gội, sấy, cắt, nhuộm và tạo kiểu tóc theo yêu cầu của khách.</p>
        </div>
        <div class="nav-actions">
          <a class="nav-btn" href="little-abc-123.html"><span>🏡</span>Vườn ABC</a>
          <div class="score-card" aria-label="Điểm salon">
            <span class="score-value" id="salon-stars">0</span>
            <span>ngôi sao</span>
          </div>
        </div>
      </section>

      <section class="screen">
        <aside class="panel">
          <div class="customer-card">
            <div class="customer-head">
              <div class="customer-face" id="customer-face">😊</div>
              <div>
                <p class="eyebrow">Khách hôm nay</p>
                <h2 id="customer-name">Mai</h2>
              </div>
            </div>
            <ul class="wish-list" id="wish-list"></ul>
          </div>

          <div>
            <p class="eyebrow">Dụng cụ</p>
            <div class="tool-grid">
              <button class="tool-btn" type="button" data-tool="wash"><span>🫧</span>Gội</button>
              <button class="tool-btn" type="button" data-tool="dry"><span>🌬️</span>Sấy</button>
              <button class="tool-btn is-active" type="button" data-tool="cut"><span>✂️</span>Cắt</button>
              <button class="tool-btn" type="button" data-tool="color"><span>🎨</span>Nhuộm</button>
              <button class="tool-btn" type="button" data-tool="style"><span>💫</span>Tạo kiểu</button>
              <button class="tool-btn" type="button" data-tool="decorate"><span>🎀</span>Phụ kiện</button>
            </div>
          </div>

          <button class="primary" type="button" id="finish-style"><span>✨</span>Hoàn thành kiểu tóc</button>
          <button class="nav-btn" type="button" id="new-customer"><span>🔄</span>Khách mới</button>
        </aside>

        <section class="salon-stage">
          <div class="mirror-label">
            <span>Gương salon</span>
            <span id="tool-label">Đang dùng kéo</span>
          </div>
          <div class="service-strip" id="service-strip"></div>

          <div class="mirror">
            <div class="avatar" id="avatar" data-length="long" data-style="straight" style="--hair-color:#6f3f27; --bangs-opacity:0">
              <div class="hair-back"></div>
              <div class="neck"></div>
              <div class="shoulders"></div>
              <div class="face">
                <span class="eye left"></span>
                <span class="eye right"></span>
                <span class="mouth"></span>
              </div>
              <div class="hair-front"></div>
              <div class="bangs"></div>
              <div class="accessory" id="accessory" hidden></div>
              <div class="sparkles" id="sparkles"></div>
              <div class="hair-snips" id="hair-snips"></div>
              <div class="bubbles" id="bubbles"></div>
              <div class="dryer-wind" id="dryer-wind"></div>
            </div>
          </div>

          <p class="feedback" id="feedback">Chọn dụng cụ rồi tạo kiểu cho khách nhé.</p>
        </section>

        <aside class="panel">
          <div id="controls"></div>

          <section class="result-panel" id="result-panel">
            <p class="eyebrow">Kết quả</p>
            <div class="result-score" id="result-score">0%</div>
            <div id="result-notes"></div>
            <button class="primary" type="button" id="save-look"><span>📸</span>Lưu vào album</button>
          </section>

          <section>
            <p class="eyebrow">Album nhỏ</p>
            <div class="gallery" id="gallery"></div>
          </section>
        </aside>
      </section>
    </main>

    <script>
      const avatar = document.getElementById("avatar");
      const accessoryNode = document.getElementById("accessory");
      const controls = document.getElementById("controls");
      const feedback = document.getElementById("feedback");
      const toolLabel = document.getElementById("tool-label");
      const resultPanel = document.getElementById("result-panel");
      const resultScore = document.getElementById("result-score");
      const resultNotes = document.getElementById("result-notes");
      const gallery = document.getElementById("gallery");
      const starsNode = document.getElementById("salon-stars");

      const hairColors = [
        { name: "nâu hạt dẻ", value: "#6f3f27" },
        { name: "đen óng", value: "#2c2530" },
        { name: "vàng mật ong", value: "#d99a28" },
        { name: "hồng dâu", value: "#e96aa0" },
        { name: "xanh biển", value: "#3f9dd6" },
        { name: "tím kẹo", value: "#9b5bd6" },
        { name: "đỏ cherry", value: "#c73f4d" },
        { name: "xanh lá", value: "#38a06f" },
        { name: "cam đào", value: "#f28b45" },
        { name: "bạc sáng", value: "#cfd9e6" },
      ];

      const lengths = [
        { id: "short", label: "Tóc ngắn", icon: "💇" },
        { id: "medium", label: "Tóc ngang vai", icon: "👧" },
        { id: "long", label: "Tóc dài", icon: "👩" },
      ];

      const styles = [
        { id: "straight", label: "Thẳng mượt", icon: "➖" },
        { id: "wavy", label: "Lượn sóng", icon: "〰️" },
        { id: "curly", label: "Xoăn bồng", icon: "🌀" },
      ];

      const accessories = [
        { id: "none", label: "Không", icon: "✨", left: "50%", top: "72px" },
        { id: "bow", label: "Nơ", icon: "🎀", left: "36%", top: "76px" },
        { id: "flower", label: "Hoa", icon: "🌸", left: "66%", top: "92px" },
        { id: "crown", label: "Vương miện", icon: "👑", left: "50%", top: "44px" },
        { id: "star", label: "Kẹp sao", icon: "⭐", left: "68%", top: "96px" },
        { id: "heart", label: "Tim", icon: "💖", left: "34%", top: "96px" },
      ];

      const customers = [
        {
          name: "Mai",
          face: "😊",
          target: { washed: true, dried: true, length: "short", color: "#e96aa0", style: "wavy", bangs: true, accessory: "bow" },
        },
        {
          name: "Linh",
          face: "😄",
          target: { washed: true, dried: true, length: "long", color: "#2c2530", style: "straight", bangs: false, accessory: "flower" },
        },
        {
          name: "An",
          face: "🙂",
          target: { washed: true, dried: true, length: "medium", color: "#3f9dd6", style: "curly", bangs: true, accessory: "star" },
        },
        {
          name: "Na",
          face: "🥰",
          target: { washed: true, dried: true, length: "long", color: "#9b5bd6", style: "wavy", bangs: false, accessory: "crown" },
        },
        {
          name: "Vy",
          face: "🤩",
          target: { washed: true, dried: true, length: "medium", color: "#d99a28", style: "straight", bangs: true, accessory: "heart" },
        },
      ];

      const state = {
        tool: "cut",
        customer: customers[0],
        look: {
          washed: false,
          dried: false,
          length: "long",
          color: "#6f3f27",
          style: "straight",
          bangs: false,
          accessory: "none",
        },
        stars: Number(localStorage.getItem("salon-stars") || "0"),
        savedLooks: JSON.parse(localStorage.getItem("salon-gallery") || "[]"),
      };

      function colorName(value) {
        return hairColors.find((item) => item.value === value)?.name || "màu tóc";
      }

      function lengthName(id) {
        return lengths.find((item) => item.id === id)?.label || "tóc";
      }

      function styleName(id) {
        return styles.find((item) => item.id === id)?.label || "kiểu tóc";
      }

      function accessoryName(id) {
        return accessories.find((item) => item.id === id)?.label || "phụ kiện";
      }

      function tone(kind) {
        if (!window.AudioContext) return;
        const context = new AudioContext();
        const osc = context.createOscillator();
        const gain = context.createGain();
        osc.frequency.value = kind === "yes" ? 760 : kind === "sparkle" ? 980 : 240;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.001, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.1, context.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(context.destination);
        osc.start();
        osc.stop(context.currentTime + 0.22);
      }

      function setTool(tool) {
        state.tool = tool;
        document.querySelectorAll("[data-tool]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.tool === tool);
        });
        const labels = {
          wash: "Đang gội tóc",
          dry: "Đang sấy tóc",
          cut: "Đang dùng kéo",
          color: "Đang nhuộm màu",
          style: "Đang tạo kiểu",
          decorate: "Đang gắn phụ kiện",
        };
        toolLabel.textContent = labels[tool];
        renderControls();
        feedback.textContent = "Chọn một lựa chọn bên phải nhé.";
        tone("sparkle");
      }

      function setLook(key, value) {
        const previousLength = state.look.length;
        state.look[key] = value;
        applyLook();
        renderServiceStrip();
        resultPanel.classList.remove("is-open");
        if (key === "length" && previousLength !== value) dropHairSnips();
        if (key === "color" || key === "accessory") sparkle();
        feedback.textContent = "Đẹp rồi, mình có thể chỉnh tiếp hoặc hoàn thành.";
        tone("sparkle");
      }

      function applyLook() {
        avatar.dataset.washed = state.look.washed ? "true" : "false";
        avatar.dataset.dried = state.look.dried ? "true" : "false";
        avatar.dataset.length = state.look.length;
        avatar.dataset.style = state.look.style;
        avatar.style.setProperty("--hair-color", state.look.color);
        avatar.style.setProperty("--bangs-opacity", state.look.bangs ? "1" : "0");
        const accessory = accessories.find((item) => item.id === state.look.accessory);
        if (!accessory || accessory.id === "none") {
          accessoryNode.hidden = true;
          accessoryNode.textContent = "";
          return;
        }
        accessoryNode.hidden = false;
        accessoryNode.textContent = accessory.icon;
        accessoryNode.style.setProperty("--accessory-left", accessory.left);
          accessoryNode.style.setProperty("--accessory-top", accessory.top);
      }

      function renderControls() {
        if (state.tool === "wash") {
          controls.innerHTML = `
            <p class="eyebrow">Gội tóc</p>
            <div class="option-grid">
              <button class="chip ${state.look.washed ? "is-active" : ""}" type="button" data-wash-action="wash"><span>🫧</span>Tạo bọt</button>
              <button class="chip" type="button" data-wash-action="rinse"><span>🚿</span>Xả nước</button>
            </div>
          `;
          controls.querySelectorAll("[data-wash-action]").forEach((button) => {
            button.addEventListener("click", () => washHair(button.dataset.washAction));
          });
          return;
        }

        if (state.tool === "dry") {
          controls.innerHTML = `
            <p class="eyebrow">Sấy tóc</p>
            <div class="option-grid">
              <button class="chip ${state.look.dried ? "is-active" : ""}" type="button" data-dry-action="dry"><span>🌬️</span>Sấy khô</button>
              <button class="chip" type="button" data-dry-action="shine"><span>✨</span>Xịt bóng</button>
            </div>
          `;
          controls.querySelectorAll("[data-dry-action]").forEach((button) => {
            button.addEventListener("click", () => dryHair(button.dataset.dryAction));
          });
          return;
        }

        if (state.tool === "cut") {
          controls.innerHTML = `
            <p class="eyebrow">Độ dài tóc</p>
            <div class="option-grid">
              ${lengths.map((item) => `<button class="chip ${state.look.length === item.id ? "is-active" : ""}" type="button" data-length="${item.id}"><span>${item.icon}</span>${item.label}</button>`).join("")}
              <button class="chip ${state.look.bangs ? "is-active" : ""}" type="button" data-bangs="toggle"><span>✂️</span>Tóc mái</button>
            </div>
          `;
          controls.querySelectorAll("[data-length]").forEach((button) => {
            button.addEventListener("click", () => setLook("length", button.dataset.length));
          });
          controls.querySelector("[data-bangs]").addEventListener("click", () => setLook("bangs", !state.look.bangs));
          return;
        }

        if (state.tool === "color") {
          controls.innerHTML = `
            <p class="eyebrow">Màu tóc</p>
            <div class="color-grid">
              ${hairColors.map((item) => `<button class="color-btn ${state.look.color === item.value ? "is-active" : ""}" type="button" data-color="${item.value}" style="--swatch:${item.value}" aria-label="${item.name}"></button>`).join("")}
            </div>
          `;
          controls.querySelectorAll("[data-color]").forEach((button) => {
            button.addEventListener("click", () => setLook("color", button.dataset.color));
          });
          return;
        }

        if (state.tool === "style") {
          controls.innerHTML = `
            <p class="eyebrow">Kiểu tóc</p>
            <div class="option-grid">
              ${styles.map((item) => `<button class="chip ${state.look.style === item.id ? "is-active" : ""}" type="button" data-style="${item.id}"><span>${item.icon}</span>${item.label}</button>`).join("")}
            </div>
          `;
          controls.querySelectorAll("[data-style]").forEach((button) => {
            button.addEventListener("click", () => setLook("style", button.dataset.style));
          });
          return;
        }

        controls.innerHTML = `
          <p class="eyebrow">Phụ kiện</p>
          <div class="accessory-grid">
            ${accessories.map((item) => `<button class="chip ${state.look.accessory === item.id ? "is-active" : ""}" type="button" data-accessory="${item.id}"><span>${item.icon}</span>${item.label}</button>`).join("")}
          </div>
        `;
        controls.querySelectorAll("[data-accessory]").forEach((button) => {
          button.addEventListener("click", () => setLook("accessory", button.dataset.accessory));
        });
      }

      function washHair(action) {
        state.look.washed = true;
        state.look.dried = false;
        applyLook();
        renderServiceStrip();
        renderControls();
        bubbles(action === "rinse" ? 10 : 18);
        feedback.textContent = action === "rinse" ? "Tóc đã được xả sạch rồi." : "Bọt gội thơm quá, tóc sạch hơn rồi.";
        tone("sparkle");
      }

      function dryHair(action) {
        if (!state.look.washed) {
          feedback.textContent = "Mình gội tóc trước rồi sấy sẽ đẹp hơn nhé.";
          tone("no");
          return;
        }
        state.look.dried = true;
        applyLook();
        renderServiceStrip();
        renderControls();
        wind();
        if (action === "shine") sparkle();
        feedback.textContent = action === "shine" ? "Tóc bóng lấp lánh rồi!" : "Tóc đã khô và phồng đẹp rồi.";
        tone("sparkle");
      }

      function renderCustomer() {
        document.getElementById("customer-name").textContent = state.customer.name;
        document.getElementById("customer-face").textContent = state.customer.face;
        const wishList = document.getElementById("wish-list");
        const target = state.customer.target;
        wishList.innerHTML = `
          <li><span>Gội</span><span>${target.washed ? "gội sạch" : "không cần"}</span></li>
          <li><span>Sấy</span><span>${target.dried ? "sấy khô" : "không cần"}</span></li>
          <li><span>Độ dài</span><span>${lengthName(target.length)}</span></li>
          <li><span>Màu</span><span>${colorName(target.color)}</span></li>
          <li><span>Kiểu</span><span>${styleName(target.style)}</span></li>
          <li><span>Mái</span><span>${target.bangs ? "có tóc mái" : "không tóc mái"}</span></li>
          <li><span>Phụ kiện</span><span>${accessoryName(target.accessory)}</span></li>
        `;
        renderServiceStrip();
      }

      function newCustomer() {
        state.customer = customers[Math.floor(Math.random() * customers.length)];
        state.look = {
          washed: false,
          dried: false,
          length: "long",
          color: "#6f3f27",
          style: "straight",
          bangs: false,
          accessory: "none",
        };
        resultPanel.classList.remove("is-open");
        renderCustomer();
        applyLook();
        renderControls();
        feedback.textContent = `${state.customer.name} đang chờ một kiểu tóc mới.`;
        sparkle();
      }

      function renderServiceStrip() {
        const strip = document.getElementById("service-strip");
        const steps = [
          { label: "🫧 Gội sạch", done: state.look.washed },
          { label: "🌬️ Sấy khô", done: state.look.dried },
          { label: "✨ Tạo kiểu", done: state.look.length === state.customer.target.length && state.look.style === state.customer.target.style },
        ];
        strip.innerHTML = steps.map((step) => `<span class="service-step ${step.done ? "is-done" : ""}">${step.label}</span>`).join("");
      }

      function scoreLook() {
        const target = state.customer.target;
        const checks = [
          ["Gội sạch", state.look.washed === target.washed],
          ["Sấy khô", state.look.dried === target.dried],
          ["Độ dài", state.look.length === target.length],
          ["Màu tóc", state.look.color === target.color],
          ["Kiểu tóc", state.look.style === target.style],
          ["Tóc mái", state.look.bangs === target.bangs],
          ["Phụ kiện", state.look.accessory === target.accessory],
        ];
        const matched = checks.filter((item) => item[1]).length;
        return {
          percent: Math.round((matched / checks.length) * 100),
          checks,
        };
      }

      function finishStyle() {
        const result = scoreLook();
        resultScore.textContent = `${result.percent}%`;
        resultNotes.innerHTML = result.checks.map(([label, ok]) => `
          <div class="summary-row"><span>${ok ? "✅" : "🔁"} ${label}</span><span>${ok ? "đúng" : "chỉnh lại"}</span></div>
        `).join("");
        resultPanel.classList.add("is-open");
        if (result.percent >= 80) {
          const earned = result.percent === 100 ? 4 : 2;
          state.stars += earned;
          localStorage.setItem("salon-stars", String(state.stars));
          starsNode.textContent = state.stars;
          feedback.textContent = result.percent === 100 ? "Tuyệt vời, khách rất thích kiểu tóc này!" : "Đẹp rồi, khách rất vui!";
          document.getElementById("customer-face").textContent = result.percent === 100 ? "🤩" : "🥰";
          sparkle();
          tone("yes");
        } else {
          feedback.textContent = "Gần được rồi, mình xem yêu cầu và chỉnh thêm nhé.";
          document.getElementById("customer-face").textContent = "🙂";
          tone("no");
        }
      }

      function saveLook() {
        const accessory = accessories.find((item) => item.id === state.look.accessory)?.icon || "✨";
        const card = {
          icon: accessory,
          color: state.look.color,
          text: `${state.look.washed ? "đã gội" : "chưa gội"} · ${lengthName(state.look.length)} ${styleName(state.look.style)}`,
        };
        state.savedLooks.unshift(card);
        state.savedLooks = state.savedLooks.slice(0, 4);
        localStorage.setItem("salon-gallery", JSON.stringify(state.savedLooks));
        renderGallery();
        feedback.textContent = "Đã lưu kiểu tóc vào album nhỏ.";
        tone("sparkle");
      }

      function renderGallery() {
        if (state.savedLooks.length === 0) {
          gallery.innerHTML = `<div class="gallery-card">📸</div><div class="gallery-card">✨</div>`;
          return;
        }
        gallery.innerHTML = state.savedLooks.map((look) => `
          <div class="gallery-card" style="color:${look.color}">
            <span>${look.icon}</span>
            <small>${look.text}</small>
          </div>
        `).join("");
      }

      function sparkle() {
        const container = document.getElementById("sparkles");
        container.innerHTML = "";
        for (let index = 0; index < 12; index += 1) {
          const sparkleNode = document.createElement("span");
          sparkleNode.textContent = ["✦", "✨", "✧"][index % 3];
          sparkleNode.style.left = `${Math.floor(Math.random() * 72) + 14}%`;
          sparkleNode.style.top = `${Math.floor(Math.random() * 46) + 10}%`;
          sparkleNode.style.animationDelay = `${index * 35}ms`;
          container.appendChild(sparkleNode);
        }
        setTimeout(() => { container.innerHTML = ""; }, 1100);
      }

      function bubbles(count = 14) {
        const container = document.getElementById("bubbles");
        container.innerHTML = "";
        for (let index = 0; index < count; index += 1) {
          const bubble = document.createElement("span");
          bubble.style.left = `${Math.floor(Math.random() * 54) + 23}%`;
          bubble.style.top = `${Math.floor(Math.random() * 24) + 22}%`;
          bubble.style.animationDelay = `${index * 38}ms`;
          container.appendChild(bubble);
        }
        setTimeout(() => { container.innerHTML = ""; }, 1300);
      }

      function wind() {
        const container = document.getElementById("dryer-wind");
        container.innerHTML = "";
        for (let index = 0; index < 9; index += 1) {
          const gust = document.createElement("span");
          gust.style.left = `${Math.floor(Math.random() * 38) + 18}%`;
          gust.style.top = `${Math.floor(Math.random() * 36) + 24}%`;
          gust.style.animationDelay = `${index * 42}ms`;
          container.appendChild(gust);
        }
        setTimeout(() => { container.innerHTML = ""; }, 1100);
      }

      function dropHairSnips() {
        const container = document.getElementById("hair-snips");
        container.innerHTML = "";
        for (let index = 0; index < 10; index += 1) {
          const snip = document.createElement("span");
          snip.textContent = "▰";
          snip.style.left = `${Math.floor(Math.random() * 48) + 26}%`;
          snip.style.top = `${Math.floor(Math.random() * 18) + 28}%`;
          snip.style.animationDelay = `${index * 28}ms`;
          container.appendChild(snip);
        }
        setTimeout(() => { container.innerHTML = ""; }, 1000);
      }

      document.querySelectorAll("[data-tool]").forEach((button) => {
        button.addEventListener("click", () => setTool(button.dataset.tool));
      });
      document.getElementById("finish-style").addEventListener("click", finishStyle);
      document.getElementById("new-customer").addEventListener("click", newCustomer);
      document.getElementById("save-look").addEventListener("click", saveLook);

      starsNode.textContent = state.stars;
      renderCustomer();
      renderControls();
      renderGallery();
      applyLook();
      renderServiceStrip();
    </script>
  </body>
</html>
