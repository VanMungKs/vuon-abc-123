<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vườn ABC 123 - Bé học số và chữ cái</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
      }

      body {
        font-family:
          ui-rounded, "Nunito", "Comic Sans MS", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #24324a;
        background:
          radial-gradient(circle at 12% 14%, rgba(255, 213, 90, 0.55), transparent 18rem),
          radial-gradient(circle at 88% 10%, rgba(119, 221, 205, 0.5), transparent 18rem),
          linear-gradient(135deg, #fff7dc 0%, #e8fbff 52%, #fff0f6 100%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(1100px, calc(100% - 28px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 22px 0 34px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 6px;
        font-size: clamp(2.2rem, 7vw, 5.4rem);
        line-height: 0.95;
      }

      h2 {
        font-size: clamp(1.7rem, 4vw, 3.2rem);
        line-height: 1.05;
      }

      .eyebrow {
        margin-bottom: 6px;
        color: #42627e;
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .scorebox {
        display: grid;
        place-items: center;
        min-width: 150px;
        padding: 12px 16px;
        border: 2px solid rgba(36, 50, 74, 0.12);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 14px 30px rgba(52, 87, 112, 0.14);
        font-weight: 900;
      }

      .top-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .sound-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 48px;
        padding: 0 14px;
        border: 2px solid rgba(36, 50, 74, 0.12);
        border-radius: 18px;
        color: #24324a;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 14px 30px rgba(52, 87, 112, 0.12);
        font-weight: 900;
      }

      .score {
        color: #f15c45;
        font-size: 2.25rem;
      }

      .screen {
        overflow: hidden;
        min-height: 650px;
        border: 2px solid rgba(36, 50, 74, 0.12);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 24px 70px rgba(52, 87, 112, 0.16);
      }

      .home {
        display: grid;
        grid-template-columns: minmax(300px, 1fr) minmax(300px, 0.9fr);
        align-items: center;
        gap: 24px;
        padding: clamp(22px, 4vw, 54px);
      }

      .garden {
        position: relative;
        min-height: 430px;
      }

      .sun {
        position: absolute;
        left: 8%;
        top: 4%;
        width: 118px;
        height: 118px;
        border-radius: 50%;
        background: #ffd65a;
        box-shadow: 0 0 0 18px rgba(255, 214, 90, 0.28);
        animation: float 3s ease-in-out infinite;
      }

      .rainbow {
        position: absolute;
        right: 2%;
        top: 42px;
        width: min(340px, 82%);
        height: 180px;
        border: 26px solid #f15c45;
        border-bottom: 0;
        border-radius: 180px 180px 0 0;
      }

      .rainbow::before,
      .rainbow::after {
        position: absolute;
        border-bottom: 0;
        border-radius: 160px 160px 0 0;
        content: "";
      }

      .rainbow::before {
        inset: 18px;
        border: 22px solid #ffc14d;
        border-bottom: 0;
      }

      .rainbow::after {
        inset: 52px;
        border: 20px solid #67d6c9;
        border-bottom: 0;
      }

      .mascot {
        position: absolute;
        left: 52%;
        bottom: 0;
        width: 240px;
        height: 270px;
        transform: translateX(-50%);
        animation: bounce 1.8s ease-in-out infinite;
      }

      .mascot::before {
        position: absolute;
        left: 50%;
        top: 20px;
        width: 150px;
        height: 150px;
        border: 6px solid #24324a;
        border-radius: 46% 46% 52% 52%;
        background: #ffcf9d;
        transform: translateX(-50%);
        content: "";
      }

      .mascot::after {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 190px;
        height: 130px;
        border: 6px solid #24324a;
        border-radius: 46px 46px 60px 60px;
        background: #7dd7cf;
        transform: translateX(-50%);
        content: "ABC";
        display: grid;
        place-items: center;
        color: #24324a;
        font-size: 2rem;
        font-weight: 900;
      }

      .eyes {
        position: absolute;
        left: 94px;
        top: 82px;
        z-index: 1;
        display: flex;
        gap: 38px;
      }

      .eyes span {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #24324a;
      }

      .mode-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin: 24px 0;
      }

      .play-section {
        display: grid;
        gap: 12px;
        margin: 12px 0 18px;
      }

      .play-title {
        margin: 0;
        color: #42627e;
        font-size: 1.15rem;
        font-weight: 900;
      }

      .play-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .mode-btn,
      .primary,
      .choice,
      .small-btn,
      .memory-card {
        border: 0;
        font-weight: 900;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          filter 160ms ease;
      }

      .mode-btn {
        display: grid;
        place-items: center;
        min-height: 126px;
        padding: 18px;
        border-radius: 26px;
        color: #24324a;
        background: #ffffff;
        box-shadow: 0 16px 30px rgba(52, 87, 112, 0.15);
        text-align: center;
        text-decoration: none;
      }

      .mode-btn span {
        display: block;
        margin-bottom: 8px;
        font-size: 2.4rem;
      }

      .play-btn {
        min-height: 112px;
        border: 3px solid rgba(36, 50, 74, 0.08);
        background: linear-gradient(180deg, #ffffff, #fff9df);
      }

      .primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 56px;
        padding: 0 26px;
        border-radius: 20px;
        color: #ffffff;
        background: linear-gradient(135deg, #f15c45, #ffb238);
        box-shadow: 0 16px 30px rgba(241, 92, 69, 0.24);
      }

      .primary:disabled,
      .small-btn:disabled {
        cursor: default;
        opacity: 0.58;
      }

      .small-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 44px;
        padding: 0 16px;
        border: 2px solid rgba(36, 50, 74, 0.14);
        border-radius: 16px;
        color: #24324a;
        background: rgba(255, 255, 255, 0.82);
      }

      .button-icon {
        font-size: 1.45rem;
        line-height: 1;
      }

      .mode-btn:hover,
      .primary:hover,
      .choice:hover,
      .small-btn:hover,
      .tile:hover,
      .memory-card:hover {
        transform: translateY(-2px);
        filter: saturate(1.04);
      }

      .game {
        padding: clamp(18px, 3vw, 34px);
      }

      .game-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .prompt-card {
        display: grid;
        gap: 16px;
        width: min(860px, 100%);
        margin: 0 auto;
        padding: clamp(18px, 4vw, 38px);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.66);
      }

      .big-symbol {
        display: grid;
        place-items: center;
        min-height: 180px;
        border: 6px solid rgba(36, 50, 74, 0.1);
        border-radius: 32px;
        color: #ffffff;
        background: linear-gradient(135deg, #466789, #67d6c9);
        font-size: clamp(5rem, 18vw, 10rem);
        font-weight: 900;
        text-shadow: 0 8px 0 rgba(36, 50, 74, 0.12);
      }

      .objects {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        min-height: 160px;
        align-items: center;
      }

      .object {
        display: grid;
        place-items: center;
        width: 82px;
        height: 82px;
        border-radius: 26px;
        background: #ffd65a;
        font-size: 2.8rem;
        box-shadow: 0 14px 20px rgba(52, 87, 112, 0.13);
        animation: pop 600ms ease both;
      }

      .choices {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .choice {
        min-height: 104px;
        padding: 12px;
        border-radius: 26px;
        color: #24324a;
        background: #ffffff;
        box-shadow: 0 16px 28px rgba(52, 87, 112, 0.14);
        font-size: clamp(1.8rem, 6vw, 3.2rem);
      }

      .choice.is-correct {
        color: #ffffff;
        background: #24a86a;
        box-shadow: 0 18px 34px rgba(36, 168, 106, 0.32);
        animation: answer-pop 460ms ease both;
      }

      .choice.is-wrong {
        color: #ffffff;
        background: #f15c45;
        box-shadow: 0 18px 34px rgba(241, 92, 69, 0.3);
        animation: answer-shake 420ms ease both;
      }

      .choice:disabled {
        cursor: default;
      }

      .train-track {
        display: grid;
        gap: 14px;
      }

      .train-slots {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .train-slot,
      .missing-card {
        display: grid;
        place-items: center;
        min-height: 92px;
        border: 3px dashed rgba(36, 50, 74, 0.22);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.68);
        color: #24324a;
        font-size: clamp(1.9rem, 7vw, 3.1rem);
        font-weight: 900;
      }

      .train-slot.is-filled {
        border-style: solid;
        color: #ffffff;
        background: #466789;
      }

      .train-slot.is-next {
        border-color: rgba(241, 92, 69, 0.54);
        background: #fff4c2;
      }

      .train-choices {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .train-choice {
        min-height: 78px;
        border: 0;
        border-radius: 22px;
        color: #24324a;
        background: #ffffff;
        box-shadow: 0 14px 24px rgba(52, 87, 112, 0.13);
        font-size: clamp(1.8rem, 6vw, 2.8rem);
        font-weight: 900;
      }

      .train-choice.is-picked {
        color: #ffffff;
        background: #24a86a;
      }

      .train-choice.is-wrong {
        color: #ffffff;
        background: #f15c45;
        animation: answer-shake 420ms ease both;
      }

      .missing-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .missing-card.is-missing {
        color: #ffffff;
        background: #f15c45;
        border-style: solid;
      }

      .letter-sky {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        min-height: 260px;
        align-items: center;
      }

      .balloon-choice {
        position: relative;
        min-height: 132px;
        border-radius: 48% 48% 54% 54%;
        background: linear-gradient(180deg, #ffffff, #fff4c2);
        animation: balloon-bob 2.2s ease-in-out infinite;
      }

      .balloon-choice::after {
        position: absolute;
        left: 50%;
        bottom: -18px;
        width: 2px;
        height: 28px;
        background: rgba(36, 50, 74, 0.22);
        content: "";
      }

      .pair-board,
      .trace-board,
      .memory-board {
        display: grid;
        gap: 12px;
        width: min(720px, 100%);
        margin: 0 auto;
      }

      .pair-board {
        grid-template-columns: repeat(4, minmax(68px, 1fr));
      }

      .memory-board {
        grid-template-columns: repeat(4, minmax(76px, 1fr));
      }

      .tile,
      .memory-card {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 100px;
        border: 3px solid rgba(36, 50, 74, 0.14);
        border-radius: 24px;
        color: #24324a;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 14px 24px rgba(52, 87, 112, 0.13);
        font-size: 2.5rem;
        font-weight: 900;
      }

      .memory-card {
        min-height: 116px;
        border-color: rgba(70, 103, 137, 0.16);
        background: linear-gradient(135deg, #466789, #67d6c9);
        color: #ffffff;
        font-size: clamp(2.2rem, 7vw, 3.8rem);
      }

      .memory-card.is-open,
      .memory-card.is-found {
        color: #24324a;
        background: #ffffff;
        animation: answer-pop 420ms ease both;
      }

      .memory-card.is-found {
        border-color: rgba(36, 168, 106, 0.44);
        box-shadow:
          0 18px 34px rgba(36, 168, 106, 0.2),
          inset 0 0 0 5px rgba(36, 168, 106, 0.14);
      }

      .memory-card.is-wrong {
        background: #f15c45;
        color: #ffffff;
        animation: answer-shake 420ms ease both;
      }

      .sword-arena {
        display: grid;
        gap: 18px;
      }

      .sword-stage {
        position: relative;
        display: grid;
        grid-template-columns: minmax(90px, 1fr) minmax(120px, 0.8fr) minmax(90px, 1fr);
        align-items: end;
        min-height: 250px;
        overflow: hidden;
        border: 6px solid rgba(36, 50, 74, 0.1);
        border-radius: 32px;
        background:
          linear-gradient(0deg, rgba(255, 214, 90, 0.42) 0 20%, transparent 20%),
          radial-gradient(circle at 50% 22%, rgba(255, 255, 255, 0.76), transparent 9rem),
          linear-gradient(180deg, #dff8ff, #fff4c2);
      }

      .sword-fighter {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 8px;
        padding-bottom: 24px;
        font-weight: 900;
      }

      .fighter-face {
        display: grid;
        place-items: center;
        width: clamp(74px, 18vw, 112px);
        height: clamp(74px, 18vw, 112px);
        border: 5px solid #24324a;
        border-radius: 50%;
        background: #ffcf9d;
        font-size: clamp(2rem, 8vw, 3rem);
        box-shadow: 0 14px 24px rgba(52, 87, 112, 0.16);
      }

      .sword-fighter::after {
        width: clamp(74px, 20vw, 126px);
        height: 64px;
        border: 5px solid #24324a;
        border-radius: 28px 28px 38px 38px;
        background: var(--fighter-color, #67d6c9);
        content: "";
      }

      .sword-blade {
        position: absolute;
        top: 46%;
        width: clamp(76px, 16vw, 124px);
        height: 14px;
        border-radius: 999px;
        background: linear-gradient(90deg, #ffffff, #ffd65a);
        box-shadow: 0 0 20px rgba(255, 214, 90, 0.8);
        transform-origin: center;
      }

      .sword-fighter.player .sword-blade {
        right: 8%;
        transform: rotate(-24deg);
      }

      .sword-fighter.partner {
        --fighter-color: #9ed7ff;
      }

      .sword-fighter.partner .sword-blade {
        left: 8%;
        transform: rotate(204deg);
      }

      .sword-fighter.is-strike {
        animation: sword-strike 520ms ease both;
      }

      .sword-fighter.is-block {
        animation: answer-shake 420ms ease both;
      }

      .sword-score {
        align-self: center;
        display: grid;
        gap: 10px;
        justify-items: center;
        color: #42627e;
        font-weight: 900;
        text-align: center;
      }

      .sword-score strong {
        color: #24324a;
        font-size: clamp(2.2rem, 8vw, 4rem);
      }

      .sword-stats {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
      }

      .sword-pill {
        display: inline-grid;
        place-items: center;
        min-height: 38px;
        padding: 0 12px;
        border-radius: 999px;
        color: #24324a;
        background: rgba(255, 255, 255, 0.88);
        font-weight: 900;
      }

      .sword-meter {
        display: grid;
        grid-template-columns: repeat(5, minmax(22px, 1fr));
        gap: 6px;
        width: min(180px, 100%);
      }

      .sword-meter span {
        min-height: 18px;
        border-radius: 999px;
        background: rgba(36, 50, 74, 0.13);
      }

      .sword-meter span.is-on {
        background: linear-gradient(90deg, #24a86a, #ffd65a);
        box-shadow: 0 8px 16px rgba(36, 168, 106, 0.18);
      }

      .sword-question {
        display: grid;
        place-items: center;
        min-height: 110px;
        border: 4px dashed rgba(70, 103, 137, 0.2);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.78);
        color: #24324a;
        font-size: clamp(2.8rem, 12vw, 5.8rem);
        font-weight: 900;
      }

      .sword-number {
        position: absolute;
        left: var(--sword-left, 50%);
        top: var(--sword-top, 40%);
        z-index: 2;
        display: grid;
        place-items: center;
        width: clamp(58px, 13vw, 82px);
        height: clamp(58px, 13vw, 82px);
        border: 4px solid rgba(36, 50, 74, 0.14);
        border-radius: 50%;
        color: #24324a;
        background: #ffffff;
        box-shadow:
          0 16px 28px rgba(52, 87, 112, 0.18),
          inset 0 0 0 5px rgba(255, 214, 90, 0.18);
        font-size: clamp(2rem, 7vw, 3rem);
        font-weight: 900;
        animation: sword-number-pop 2.8s ease-in-out forwards;
      }

      .sword-number.is-hit {
        pointer-events: none;
        color: #ffffff;
        background: #24a86a;
        animation: target-hit 260ms ease forwards;
      }

      .sword-number.is-wrong {
        color: #ffffff;
        background: #f15c45;
        animation: answer-shake 420ms ease both;
      }

      .tile.is-selected {
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.96);
        background: var(--pair-color, #466789);
        box-shadow:
          0 18px 34px var(--pair-shadow, rgba(70, 103, 137, 0.28)),
          inset 0 0 0 5px rgba(255, 255, 255, 0.2);
        transform: translateY(-2px) scale(1.03);
      }

      .tile.is-found {
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.96);
        background: var(--pair-color, #7dd7cf);
        box-shadow:
          0 18px 34px var(--pair-shadow, rgba(125, 215, 207, 0.28)),
          inset 0 0 0 5px rgba(255, 255, 255, 0.22);
      }

      .tile.is-found::after {
        position: absolute;
        right: 10px;
        top: 8px;
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        color: #24324a;
        background: rgba(255, 255, 255, 0.9);
        font-size: 1rem;
        content: "✓";
      }

      .trace-line {
        display: grid;
        grid-template-columns: repeat(5, minmax(44px, 1fr));
        gap: 10px;
      }

      .dot {
        display: grid;
        place-items: center;
        min-height: 72px;
        border: 2px dashed rgba(36, 50, 74, 0.22);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.72);
        font-size: 1.6rem;
        font-weight: 900;
      }

      .dot:disabled {
        cursor: default;
        opacity: 1;
      }

      .dot.is-active {
        color: #ffffff;
        background: #f15c45;
        border-style: solid;
      }

      .trace-symbol {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 220px;
        overflow: hidden;
        border: 6px solid rgba(36, 50, 74, 0.1);
        border-radius: 32px;
        background: linear-gradient(135deg, #466789, #67d6c9);
        font-size: clamp(6rem, 20vw, 12rem);
        font-weight: 900;
      }

      .trace-base,
      .trace-fill {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
      }

      .trace-base {
        color: rgba(255, 255, 255, 0.24);
        -webkit-text-stroke: 5px rgba(255, 255, 255, 0.78);
      }

      .trace-fill {
        color: #ffd65a;
        clip-path: inset(0 calc(100% - var(--trace-progress, 0%)) 0 0);
        text-shadow: 0 8px 0 rgba(36, 50, 74, 0.14);
        transition: clip-path 260ms ease;
      }

      .trace-progress {
        height: 14px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(36, 50, 74, 0.12);
      }

      .trace-progress span {
        display: block;
        width: var(--trace-progress, 0%);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #f15c45, #ffd65a, #67d6c9);
        transition: width 260ms ease;
      }

      .feedback {
        min-height: 42px;
        color: #42627e;
        font-size: 1.2rem;
        font-weight: 900;
        text-align: center;
      }

      .bonus-card {
        display: grid;
        gap: 12px;
        margin-top: 18px;
        padding: 16px;
        border: 3px solid rgba(241, 92, 69, 0.18);
        border-radius: 24px;
        background: rgba(255, 246, 203, 0.9);
      }

      .bonus-card strong {
        font-size: 1.15rem;
      }

      const state = {
        score: 0,

      function shuffle(items) {
        const copy = items.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function randomItem(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function buildChoices(answer, pool, size = 3) {
        const choices = [answer];
        const candidates = shuffle(pool).filter((item) => String(item) !== String(answer));
        while (choices.length < size && candidates.length > 0) {
          choices.push(candidates.shift());
        }
        return shuffle(choices);
      }

      function escapeHtml(value) {
        return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");

        scoreNode.textContent = state.score;
        starsNode.textContent = state.score >= 10 ? "🎮 Đủ 10 điểm" : `🎯 ${state.score}/10 điểm`;
      }

      function canPlayBonus() {
        return state.score >= 10;
      }

      function awardLearningPoint() {
        state.score += 1;
        updateHud();
        if (state.score === 10) {
          speak("Bi và Xoài đã đủ mười điểm để chơi game thưởng");
        }
      }

      function clearBonusTimers() {
        clearInterval(state.bonusTimer);
        clearInterval(state.bonusSpawnTimer);
        clearInterval(state.swordTimer);
        clearInterval(state.swordSpawnTimer);
        state.bonusTimer = null;
        state.bonusSpawnTimer = null;
        state.swordTimer = null;
        state.swordSpawnTimer = null;
      }

      function clearTaskTimer() {
        clearTimeout(state.nextTaskTimer);
        state.nextTaskTimer = null;
      }

      function bonusButtonMarkup(id = "bonus") {
        if (!canPlayBonus()) return "";
        return `<button class="primary" type="button" id="${id}" aria-label="Chọn game thưởng"><span class="button-icon" aria-hidden="true">🎮</span><span>Chọn game thưởng</span></button>`;
      }

      function speechKey(text) {
        return String(text)
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/đ/g, "d")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 96) || "voice";
      }

      function stopCurrentAudio() {
        if (state.currentAudio) {
          state.currentAudio.pause();
          state.currentAudio.currentTime = 0;
          state.currentAudio = null;
        }
      }

      function speak(text) {
        stopCurrentAudio();
        const audio = new Audio(`tts/${speechKey(text)}.m4a`);
        state.currentAudio = audio;
        audio.preload = "auto";
        audio.addEventListener("ended", () => {
          if (state.currentAudio === audio) state.currentAudio = null;
        }, { once: true });
        audio.addEventListener("error", () => {
          if (state.currentAudio === audio) state.currentAudio = null;
          soundLabel.textContent = "Thiếu tiếng Việt";
        }, { once: true });
        audio.play().catch(() => {
          if (state.currentAudio === audio) state.currentAudio = null;
          soundLabel.textContent = "Bấm 🔊 để bật tiếng";
        });
      }

      function enableSound() {
        state.soundReady = true;
        soundLabel.textContent = "Đã bật tiếng";
        speak("Đã bật tiếng Việt. Bi và Xoài cùng học nhé.");
      }

      function letterSpeech(letter) {
        return letterNames[letter] || letter.toLowerCase();
      }

      function numberSpeech(number) {
        return numberNames[number] || String(number);
      }

      function answerSpeech(choice) {
        if (state.task.kind === "letter" || state.task.kind === "balloons") return `Con chọn chữ ${letterSpeech(choice)}`;
        if (state.task.kind === "number" || state.task.kind === "count" || state.task.kind === "missing") return `Con chọn số ${numberSpeech(Number(choice))}`;
        return `Con chọn ${choice}`;
      }

      function tone(kind) {
        if (!window.AudioContext) return;
        const context = new AudioContext();
        const osc = context.createOscillator();
        const gain = context.createGain();
        osc.frequency.value = kind === "yes" ? 740 : kind === "tap" ? 440 : 220;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.001, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.1, context.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 0.18);
        osc.connect(gain);
        gain.connect(context.destination);
        osc.start();
        osc.stop(context.currentTime + 0.2);
      }

      function drawPairs() {
        renderShell(
          "Tìm chữ và hình",
          `

                const found = state.pairFound.includes(tile.uid);
                const selected = state.pairSelected.includes(index);
                return `<button class="tile ${found ? "is-found" : ""} ${selected ? "is-selected" : ""}" type="button" data-pair="${index}" data-pair-letter="${escapeHtml(tile.pair)}" style="--pair-color:${tile.color}; --pair-shadow:${tile.shadow}" aria-label="${escapeHtml(tile.speech)}">${escapeHtml(tile.label)}</button>`;

      function choosePair(index) {
        const tile = state.task.tiles[index];
        if (state.pairFound.includes(tile.uid) || state.pairSelected.includes(index)) return;
        state.pairSelected.push(index);
        tone("tap");
        speak(tile.speech);
        if (state.pairSelected.length < 2) {
          drawPairs();
          return;
        }
        const [firstIndex, secondIndex] = state.pairSelected;
        const first = state.task.tiles[firstIndex];
        const second = state.task.tiles[secondIndex];
        if (first.pair === second.pair) {
          state.pairFound.push(first.uid, second.uid);
          state.pairSelected = [];
          awardLearningPoint();
          state.feedback = "Đúng một cặp rồi!";
          tone("yes");
          speak("Đúng rồi");
          if (state.pairFound.length === state.task.tiles.length) {
            state.feedback = "Bé tìm đủ tất cả cặp rồi!";
          }
          drawPairs();
          return;
        }
        state.feedback = "Chưa giống nhau, mình thử lại nhé.";
        tone("no");
        drawPairs();
        setTimeout(() => {
          state.pairSelected = [];
          drawPairs();
        }, 700);
      }

      function drawTrace() {
        const progress = `${state.traceStep * 20}%`;
        renderShell(
          `Tập tô chữ ${state.task.answer}`,
          `
            <div class="trace-symbol" style="--trace-progress:${progress}" aria-label="Chữ ${letterSpeech(state.task.answer)} đã tô ${state.traceStep} trên 5 nét">
              <span class="trace-base" aria-hidden="true">${escapeHtml(state.task.answer)}</span>
              <span class="trace-fill" aria-hidden="true">${escapeHtml(state.task.answer)}</span>
            </div>
            <div class="trace-progress" style="--trace-progress:${progress}" aria-hidden="true"><span></span></div>
            <div class="trace-board">
              <div class="trace-line">
                ${Array.from({ length: 5 }).map((_, index) => `<button class="dot ${index < state.traceStep ? "is-active" : ""}" type="button" data-dot="${index}" ${index < state.traceStep || state.traceStep >= 5 ? "disabled" : ""}>${index + 1}</button>`).join("")}
              </div>
            </div>
          `,
        );
        screen.querySelectorAll("[data-dot]").forEach((button) => {
          button.addEventListener("click", () => {
            const index = Number(button.dataset.dot);
            if (index !== state.traceStep) {
              state.feedback = "Bấm theo thứ tự số nhé.";
              tone("no");
              drawTrace();
              return;
            }
            state.traceStep += 1;
            tone("tap");
            if (state.traceStep >= 5) {
              awardLearningPoint();
              state.feedback = "Tô chữ xong rồi, giỏi quá!";
              speak("Giỏi quá");
            } else {
              state.feedback = `Tô được ${state.traceStep} nét rồi.`;

            drawTrace();
          });
        });
        document.getElementById("listen").addEventListener("click", () => { enableSound(); speak(state.task.speech); });

      function renderMemoryGame(type) {
        const isFruit = type === "fruit";
        const selectedItems = isFruit
          ? shuffle(fruitItems).slice(0, 4)
          : shuffle(Array.from({ length: 10 }, (_, number) => ({ icon: String(number), name: `số ${numberSpeech(number)}` }))).slice(0, 4);
        const cards = shuffle(selectedItems.flatMap((item, index) => [
          { uid: `${type}-${index}-a`, pair: item.name, label: item.icon, speech: item.name },
          { uid: `${type}-${index}-b`, pair: item.name, label: item.icon, speech: item.name },
        ]));
        state.task = {
          kind: "memory",
          type,
          title: isFruit ? "Tìm quả giống nhau" : "Tìm số giống nhau",
          cards,
          speech: isFruit ? "Bi và Xoài hãy tìm hai quả giống nhau" : "Bi và Xoài hãy tìm hai số giống nhau",
        };
        state.pairSelected = [];
        state.pairFound = [];
        drawMemoryGame();
        speak(state.task.speech);
      }

      function drawMemoryGame() {
        renderShell(
          state.task.title,
          `
            <div class="memory-board">
              ${state.task.cards.map((card, index) => {
                const found = state.pairFound.includes(card.uid);
                const selected = state.pairSelected.includes(index);
                const isOpen = found || selected;
                return `<button class="memory-card ${isOpen ? "is-open" : ""} ${found ? "is-found" : ""}" type="button" data-memory="${index}" ${found ? "disabled" : ""} aria-label="${isOpen ? escapeHtml(card.speech) : "Thẻ úp"}">${isOpen ? escapeHtml(card.label) : "?"}</button>`;
              }).join("")}
            </div>
          `,
        );
        screen.querySelectorAll("[data-memory]").forEach((button) => {
          button.addEventListener("click", () => chooseMemoryCard(Number(button.dataset.memory)));
        });
        document.getElementById("listen").addEventListener("click", () => { enableSound(); speak(state.task.speech); });
      }

      function chooseMemoryCard(index) {
        const card = state.task.cards[index];
        if (state.pairFound.includes(card.uid) || state.pairSelected.includes(index) || state.pairSelected.length >= 2) return;
        state.pairSelected.push(index);
        tone("tap");
        speak(card.speech);
        drawMemoryGame();
        if (state.pairSelected.length < 2) return;

        const [firstIndex, secondIndex] = state.pairSelected;
        const first = state.task.cards[firstIndex];
        const second = state.task.cards[secondIndex];
        if (first.pair === second.pair) {
          state.pairFound.push(first.uid, second.uid);
          state.pairSelected = [];
          awardLearningPoint();
          state.feedback = "Đúng một cặp rồi!";
          tone("yes");
          speak("Đúng rồi");
          const completed = state.pairFound.length === state.task.cards.length;
          if (state.pairFound.length === state.task.cards.length) {
            state.feedback = "Bé tìm đủ tất cả cặp rồi!";
          }
          drawMemoryGame();
          if (completed) state.nextTaskTimer = setTimeout(nextTask, correctNextDelayMs);
          return;
        }

        state.feedback = "Chưa giống nhau, mình nhớ lại nhé.";
        tone("no");
        drawMemoryGame();
        state.nextTaskTimer = setTimeout(() => {
          state.pairSelected = [];
          drawMemoryGame();
        }, retryDelayMs);
      }

      function renderOddOne() {
        const challenge = randomItem(oddChallenges);
        const answerIndex = Math.floor(Math.random() * 9);
        const cards = Array.from({ length: 9 }, (_, index) => ({
          uid: `odd-${index}`,
          label: index === answerIndex ? challenge.odd.icon : challenge.common.icon,
          speech: index === answerIndex ? challenge.odd.name : challenge.common.name,
          isOdd: index === answerIndex,
        }));
        state.task = {
          kind: "odd",
          title: "Tìm hình khác biệt",
          cards,
          answer: cards[answerIndex].uid,
          speech: "Bi và Xoài hãy tìm hình khác biệt",
        };
        drawOddOne();
        speak(state.task.speech);
      }

      function drawOddOne() {
        renderShell(
          state.task.title,
          `
            <div class="choices">
              ${state.task.cards.map((card) => `<button class="choice" type="button" data-odd="${card.uid}" aria-label="${escapeHtml(card.speech)}">${escapeHtml(card.label)}</button>`).join("")}
            </div>
          `,
        );
        screen.querySelectorAll("[data-odd]").forEach((button) => {
          button.addEventListener("click", () => chooseOddOne(button));
        });
        document.getElementById("listen").addEventListener("click", () => { enableSound(); speak(state.task.speech); });
      }

      function chooseOddOne(button) {
        const isCorrect = button.dataset.odd === state.task.answer;
        const answerButtons = [...screen.querySelectorAll("[data-odd]")];
        const feedback = screen.querySelector(".feedback");
        answerButtons.forEach((item) => {
          item.disabled = true;
          item.classList.remove("is-correct", "is-wrong");
        });
        if (isCorrect) {
          clearTaskTimer();
          button.classList.add("is-correct");
          awardLearningPoint();
          state.feedback = "Đúng rồi, bé tìm rất nhanh!";
          if (feedback) feedback.textContent = state.feedback;
          tone("yes");
          speak("Đúng rồi");
          state.nextTaskTimer = setTimeout(nextTask, correctNextDelayMs);
          return;
        }
        button.classList.add("is-wrong");
        state.feedback = "Chưa đúng, mình nhìn kỹ lại nhé.";
        if (feedback) feedback.textContent = state.feedback;
        tone("no");
        speak("Chưa đúng, thử lại nhé");
        state.nextTaskTimer = setTimeout(drawOddOne, retryDelayMs);
      }

      function makeSwordQuestion(phase) {
        const answer = randomItem(swordNumbers);
        return {
          kind: "sword",
          phase,
          answer: String(answer),
          choices: buildChoices(String(answer), swordNumbers.map(String), 4),
          speech: phase === "gate"
            ? `Muốn vào sân đấu kiếm, Bi và Xoài hãy chọn số ${numberSpeech(answer)}`
            : `Ra đòn ánh sáng số ${numberSpeech(answer)}`,
        };
      }

      function renderSwordGate() {
        clearTaskTimer();
        clearBonusTimers();
        state.swordPhase = "gate";
        state.swordPower = 0;
        state.swordBlocks = 0;
        state.feedback = "";
        state.task = makeSwordQuestion("gate");
        renderSwordScreen();
        speak(state.task.speech);
      }

      function startSwordPlay() {
        clearTaskTimer();
        clearBonusTimers();
        state.swordPhase = "play";
        state.swordPower = 0;
        state.swordBlocks = 0;
        state.swordTimeLeft = 24;
        state.feedback = "Chạm đúng số đang hiện trong sân để ra đòn ánh sáng!";
        state.task = makeSwordQuestion("fight");
        renderSwordPlayScreen();
        speak("Vào sân đấu kiếm rồi. Chạm số đúng để ra đòn ánh sáng nhé.");
        spawnSwordNumber(true);
        state.swordSpawnTimer = setInterval(() => spawnSwordNumber(false), 780);
        state.swordTimer = setInterval(() => {
          state.swordTimeLeft -= 1;
          const timeNode = document.getElementById("sword-time");
          if (timeNode) timeNode.textContent = state.swordTimeLeft;
          if (state.swordTimeLeft <= 0) finishSwordPlay(false);
        }, 1000);
      }

      function swordMeterMarkup(value) {
        return `<div class="sword-meter" aria-label="${value} trên 5 điểm">${Array.from({ length: 5 }).map((_, index) => `<span class="${index < value ? "is-on" : ""}"></span>`).join("")}</div>`;
      }

      function renderSwordScreen() {
        renderShell(
          "Vào sân đấu kiếm số",
          `
            <div class="sword-arena">
              <div class="sword-stage" aria-label="Sân đấu kiếm ánh sáng">
                <div class="sword-fighter player" style="--strike-move:24px">
                  <div class="fighter-face" aria-hidden="true">🙂</div>
                  <span>Bi</span>
                  <i class="sword-blade" aria-hidden="true"></i>
                </div>
                <div class="sword-score">
                  <span>Cửa vào</span>
                  <strong>?</strong>
                  ${swordMeterMarkup(state.swordPower)}
                </div>
                <div class="sword-fighter partner" style="--strike-move:-24px">
                  <div class="fighter-face" aria-hidden="true">😊</div>
                  <span>Xoài</span>
                  <i class="sword-blade" aria-hidden="true"></i>
                </div>
              </div>
              <div class="sword-question">${numberSpeech(Number(state.task.answer))}</div>
              <div class="choices">
                ${state.task.choices.map((choice) => `<button class="choice" type="button" data-sword="${choice}" aria-label="Số ${numberSpeech(Number(choice))}">${choice}</button>`).join("")}
              </div>
            </div>
          `,
        );
        screen.querySelectorAll("[data-sword]").forEach((button) => {
          button.addEventListener("click", () => chooseSwordGateNumber(button));
        });
        document.getElementById("listen").addEventListener("click", () => { enableSound(); speak(state.task.speech); });
      }

      function renderSwordPlayScreen() {
        updateHud();
        screen.innerHTML = `
          <section class="screen game">
            <div class="game-head">
              <div>
                <p class="eyebrow">Đấu kiếm ánh sáng</p>
                <h2>Chạm đúng số để ra đòn</h2>
              </div>
              <button class="small-btn" type="button" id="home" aria-label="Về vườn">
                <span class="button-icon" aria-hidden="true">🏡</span>
                <span>Về vườn</span>
              </button>
            </div>
            <div class="prompt-card">
              <div class="sword-arena">
                <div class="sword-stats" aria-label="Thông tin đấu kiếm">
                  <span class="sword-pill">⏱️ <span id="sword-time">${state.swordTimeLeft}</span> giây</span>
                  <span class="sword-pill">⚔️ <span id="sword-hits">${state.swordPower}</span>/5 đòn</span>
                </div>
                <div class="sword-stage" id="sword-stage" aria-label="Sân đấu kiếm ánh sáng">
                  <div class="sword-fighter player" style="--strike-move:24px">
                    <div class="fighter-face" aria-hidden="true">🙂</div>
                    <span>Bi</span>
                    <i class="sword-blade" aria-hidden="true"></i>
                  </div>
                  <div class="sword-score">
                    <span>Tìm số</span>
                    <strong id="sword-word">${numberSpeech(Number(state.task.answer))}</strong>
                    <div id="sword-meter">${swordMeterMarkup(state.swordPower)}</div>
                  </div>
                  <div class="sword-fighter partner" style="--strike-move:-24px">
                    <div class="fighter-face" aria-hidden="true">😊</div>
                    <span>Xoài</span>
                    <i class="sword-blade" aria-hidden="true"></i>
                  </div>
                </div>
              </div>
              <p class="feedback" id="sword-feedback">${escapeHtml(state.feedback)}</p>
              <div class="footer-actions">
                <button class="small-btn" type="button" id="listen" aria-label="Nghe lại">
                  <span class="button-icon" aria-hidden="true">🔊</span>
                  <span>Nghe lại</span>
                </button>
                <button class="small-btn" type="button" id="next" aria-label="Chơi lại">
                  <span class="button-icon" aria-hidden="true">🔄</span>
                  <span>Chơi lại</span>
                </button>
              </div>
            </div>
          </section>
        `;
        document.getElementById("home").addEventListener("click", renderHome);
        document.getElementById("next").addEventListener("click", renderSwordGate);
        document.getElementById("listen").addEventListener("click", () => { enableSound(); speak(`Ra đòn ánh sáng số ${numberSpeech(Number(state.task.answer))}`); });
      }

      function updateSwordPlayHud() {
        const hits = document.getElementById("sword-hits");
        const word = document.getElementById("sword-word");
        const meter = document.getElementById("sword-meter");
        if (hits) hits.textContent = state.swordPower;
        if (word) word.textContent = numberSpeech(Number(state.task.answer));
        if (meter) meter.innerHTML = swordMeterMarkup(state.swordPower);
      }

      function spawnSwordNumber(forceTarget = false) {
        const stage = document.getElementById("sword-stage");
        if (!stage || state.swordPhase !== "play" || state.swordTimeLeft <= 0) return;
        const targetValue = Number(state.task.answer);
        const value = forceTarget || Math.random() < 0.42 ? targetValue : randomItem(swordNumbers);
        const numberButton = document.createElement("button");
        numberButton.type = "button";
        numberButton.className = "sword-number";
        numberButton.dataset.swordOrb = String(value);
        numberButton.textContent = value;
        numberButton.setAttribute("aria-label", `Số ${numberSpeech(value)}`);
        numberButton.style.setProperty("--sword-left", `${Math.floor(Math.random() * 62) + 18}%`);
        numberButton.style.setProperty("--sword-top", `${Math.floor(Math.random() * 44) + 18}%`);
        numberButton.addEventListener("click", () => chooseSwordOrb(numberButton));
        stage.appendChild(numberButton);
        setTimeout(() => numberButton.remove(), 2900);
      }

      function chooseSwordGateNumber(button) {
        const selected = button.dataset.sword;
        const isCorrect = selected === state.task.answer;
        const feedback = screen.querySelector(".feedback");
        screen.querySelectorAll("[data-sword]").forEach((item) => {
          item.disabled = true;
          item.classList.remove("is-correct", "is-wrong");
        });

        if (isCorrect && state.swordPhase === "gate") {
          button.classList.add("is-correct");
          state.swordPower = 1;
          state.feedback = `Đúng rồi! Số ${numberSpeech(Number(selected))} mở cửa sân kiếm.`;
          if (feedback) feedback.textContent = state.feedback;
          screen.querySelector(".sword-fighter.player")?.classList.add("is-strike");
          tone("yes");
          speak(`Đúng rồi. Số ${numberSpeech(Number(selected))} mở cửa sân kiếm`);
          state.nextTaskTimer = setTimeout(startSwordPlay, 1500);
          return;
        }

        button.classList.add("is-wrong");
        state.feedback = `Đỡ kiếm nhé. Con chọn số ${numberSpeech(Number(selected))}, mình thử lại.`;
        if (feedback) feedback.textContent = state.feedback;
        screen.querySelector(".sword-fighter.partner")?.classList.add("is-block");
        tone("no");
        speak(`Con chọn số ${numberSpeech(Number(selected))}. Chưa đúng, thử lại nhé`);
        state.nextTaskTimer = setTimeout(renderSwordGate, retryDelayMs);
      }

      function chooseSwordOrb(button) {
        if (button.classList.contains("is-hit") || button.classList.contains("is-wrong")) return;
        const selected = Number(button.dataset.swordOrb);
        const target = Number(state.task.answer);
        const feedback = document.getElementById("sword-feedback");
        if (selected === target) {
          button.classList.add("is-hit");
          state.swordPower += 1;
          state.feedback = `Đúng số ${numberSpeech(selected)}! Kiếm sáng lên rồi.`;
          if (feedback) feedback.textContent = state.feedback;
          screen.querySelector(".sword-fighter.player")?.classList.remove("is-strike");
          void screen.querySelector(".sword-fighter.player")?.offsetWidth;
          screen.querySelector(".sword-fighter.player")?.classList.add("is-strike");
          tone("yes");
          speak(`Đúng rồi. Ra đòn ánh sáng số ${numberSpeech(selected)}`);
          setTimeout(() => button.remove(), 240);
          if (state.swordPower >= 5) {
            finishSwordPlay(true);
            return;
          }
          state.task = makeSwordQuestion("fight");
          updateSwordPlayHud();
          spawnSwordNumber(true);
          return;
        }
        button.classList.add("is-wrong");
        state.swordBlocks += 1;
        state.feedback = `Con chọn số ${numberSpeech(selected)}. Chưa đúng, tìm số ${numberSpeech(target)} nhé.`;
        if (feedback) feedback.textContent = state.feedback;
        screen.querySelector(".sword-fighter.partner")?.classList.remove("is-block");
        void screen.querySelector(".sword-fighter.partner")?.offsetWidth;
        screen.querySelector(".sword-fighter.partner")?.classList.add("is-block");
        tone("no");
        speak(`Con chọn số ${numberSpeech(selected)}. Chưa đúng, thử lại nhé`);
        setTimeout(() => button.remove(), 520);
      }

      function finishSwordPlay(won) {
        clearBonusTimers();
        document.querySelectorAll(".sword-number").forEach((item) => item.remove());
        const feedback = document.getElementById("sword-feedback");
        if (won) {
          awardLearningPoint();
          state.feedback = "Thắng rồi, bé nhớ số rất tốt!";
          if (feedback) feedback.textContent = state.feedback;
          speak("Thắng rồi, bé nhớ số rất tốt");
          state.nextTaskTimer = setTimeout(nextTask, correctNextDelayMs);
          return;
        }
        state.feedback = "Hết giờ rồi. Mình luyện lại nhé.";
        if (feedback) feedback.textContent = state.feedback;
        speak("Hết giờ rồi. Mình luyện lại nhé.");
      }

      function bindAnswerButtons() {
        screen.querySelectorAll("[data-answer]").forEach((button) => {
          button.addEventListener("click", () => {
            const correct = button.dataset.answer === String(state.task.answer);
            const spokenChoice = answerSpeech(button.dataset.answer);
            const answerButtons = [...screen.querySelectorAll("[data-answer]")];
            const feedback = screen.querySelector(".feedback");
            answerButtons.forEach((item) => {
              item.disabled = true;
              item.classList.remove("is-correct", "is-wrong");
            });
            if (correct) {
              clearTaskTimer();
              button.classList.add("is-correct");
              awardLearningPoint();
              state.feedback = `${spokenChoice}. Đúng rồi, bé giỏi quá!`;
              if (feedback) feedback.textContent = state.feedback;
              updateHud();
              tone("yes");
              speak(`${spokenChoice}. Đúng rồi, bé giỏi quá`);
              state.nextTaskTimer = setTimeout(nextTask, correctNextDelayMs);
            } else {
              button.classList.add("is-wrong");
              state.feedback = `${spokenChoice}. Chưa đúng, mình thử lại nhé.`;
              if (feedback) feedback.textContent = state.feedback;
              tone("no");
              speak(`${spokenChoice}. Chưa đúng, thử lại nhé`);
              setTimeout(renderCurrentTask, retryDelayMs);
            }
          });
        });
      }

      function renderCurrentTask() {
        if (state.task.kind === "number") renderFindNumber(false);
        if (state.task.kind === "letter") renderFindLetter(false);
        if (state.task.kind === "count") renderCountObjects(false);
        if (state.task.kind === "missing") renderMissingNumber(false);
        if (state.task.kind === "balloons") renderLetterBalloons(false);
      }

      function getBonusGame(id) {
        return bonusGames.find((game) => game.id === id) || bonusGames[0];
      }

      function renderBonusMenu() {
        clearTaskTimer();
        clearBonusTimers();
        if (!canPlayBonus()) {
          state.feedback = "Cần đủ 10 điểm học để mở game thưởng.";
          renderHome();
          return;
        }
        updateHud();
        screen.innerHTML = `
          <section class="screen game">
            <div class="game-head">
              <div>
                <p class="eyebrow">Game thưởng</p>
                <h2>Bi và Xoài chọn trò nào?</h2>
              </div>
              <button class="small-btn" type="button" id="home" aria-label="Về vườn">
                <span class="button-icon" aria-hidden="true">🏡</span>
                <span>Về vườn</span>
              </button>
            </div>
            <div class="prompt-card">
              <div class="bonus-menu-grid">
                ${bonusGames.map((game) => `
                  <button class="bonus-option" type="button" data-bonus-game="${game.id}" aria-label="${escapeHtml(game.title)}">
                    <span class="bonus-option-icon" aria-hidden="true">${game.icon}</span>
                    <span>${escapeHtml(game.title)}<br><small>${escapeHtml(game.hint)}</small></span>
                  </button>
                `).join("")}
              </div>
              <p class="feedback">Mỗi lượt game thưởng dùng 10 điểm.</p>
            </div>
          </section>
        `;
        document.getElementById("home").addEventListener("click", renderHome);
        screen.querySelectorAll("[data-bonus-game]").forEach((button) => {
          button.addEventListener("click", () => startBonusGame(button.dataset.bonusGame));
        });
        speak("Bi và Xoài hãy chọn một game thưởng");
      }

      function startBonusGame(gameId = "birds") {
        clearTaskTimer();
        clearBonusTimers();
        if (!canPlayBonus()) {
          state.feedback = "Cần đủ 10 điểm học để mở game thưởng.";
          renderHome();
          return;
        }
        const game = getBonusGame(gameId);
        state.bonusGame = game.id;
        state.score -= 10;
        state.bonusHits = 0;
        state.bonusTimeLeft = 20;
        updateHud();
        screen.innerHTML = `
          <section class="screen game">
            <div class="game-head">
              <div>
                <p class="eyebrow">Game thưởng</p>
                <h2>${escapeHtml(game.title)}</h2>
              </div>
              <button class="small-btn" type="button" id="home" aria-label="Về vườn">
                <span class="button-icon" aria-hidden="true">🏡</span>
                <span>Về vườn</span>
              </button>
            </div>
            <div class="prompt-card">
              <div class="bonus-stats" aria-label="Thông tin game thưởng">
                <span class="bonus-pill">⏱️ <span id="bonus-time">20</span> giây</span>
                <span class="bonus-pill">⭐ <span id="bonus-hits">0</span> sao</span>
              </div>
              <div class="bonus-scene ${game.sceneClass}" id="bonus-scene" aria-label="${escapeHtml(game.hint)}"></div>
              <p class="feedback" id="bonus-feedback">${escapeHtml(game.hint)}</p>
              <div class="footer-actions">
                <button class="small-btn" type="button" id="bonus-again" ${canPlayBonus() ? "" : "disabled"} aria-label="Chơi tiếp">
                  <span class="button-icon" aria-hidden="true">🎮</span>
                  <span>Chơi lại</span>
                </button>
                <button class="small-btn" type="button" id="bonus-menu" ${canPlayBonus() ? "" : "disabled"} aria-label="Chọn trò khác">
                  <span class="button-icon" aria-hidden="true">🎁</span>
                  <span>Trò khác</span>
                </button>
                <button class="small-btn" type="button" id="learn-more" aria-label="Học tiếp">
                  <span class="button-icon" aria-hidden="true">📚</span>
                  <span>Học tiếp</span>
                </button>
              </div>
            </div>
          </section>
        `;
        document.getElementById("home").addEventListener("click", renderHome);
        document.getElementById("learn-more").addEventListener("click", renderHome);
        document.getElementById("bonus-again").addEventListener("click", () => startBonusGame(state.bonusGame));
        document.getElementById("bonus-menu").addEventListener("click", renderBonusMenu);
        speak(game.speech);
        spawnBonusTarget();
        state.bonusSpawnTimer = setInterval(spawnBonusTarget, game.id === "flowers" ? 620 : 780);
        state.bonusTimer = setInterval(() => {
          state.bonusTimeLeft -= 1;
          document.getElementById("bonus-time").textContent = state.bonusTimeLeft;
          if (state.bonusTimeLeft <= 0) finishBonusGame();
        }, 1000);
      }

      function spawnBonusTarget() {
        const scene = document.getElementById("bonus-scene");
        if (!scene || state.bonusTimeLeft <= 0) return;
        const game = getBonusGame(state.bonusGame);
        const target = document.createElement("button");
        target.type = "button";
        target.className = `bonus-target ${game.id === "stars" ? "star-target" : game.id === "flowers" ? "flower-target" : ""}`;
        target.setAttribute("aria-label", game.id === "stars" ? "Ngôi sao" : game.id === "flowers" ? "Bông hoa" : "Chim giấy");
        target.textContent = game.id === "stars"
          ? randomItem(["⭐", "🌟", "💫"])
          : game.id === "flowers"
            ? randomItem(["🌸", "🌼", "🌻"])
            : randomItem(["🕊️", "🐦", "⭐"]);
        const top = game.id === "flowers" ? Math.floor(Math.random() * 20) + 58 : Math.floor(Math.random() * 68) + 8;
        const left = Math.floor(Math.random() * 76) + 8;
        const speed = game.id === "stars"
          ? Math.floor(Math.random() * 1400) + 3000
          : game.id === "flowers"
            ? Math.floor(Math.random() * 900) + 1600
            : Math.floor(Math.random() * 1600) + 3800;
        target.style.setProperty("--target-top", `${top}%`);
        target.style.setProperty("--target-left", `${left}%`);
        target.style.setProperty("--target-speed", `${speed}ms`);
        target.addEventListener("click", () => {
          if (target.classList.contains("is-hit")) return;
          target.classList.add("is-hit");
          state.bonusHits += 1;
          document.getElementById("bonus-hits").textContent = state.bonusHits;
          document.getElementById("bonus-feedback").textContent = game.id === "flowers"
            ? "Hoa nở rồi, nhận một ngôi sao!"
            : "Trúng rồi, nhận một ngôi sao!";
          tone("yes");
          setTimeout(() => target.remove(), 260);
        });
        scene.appendChild(target);
        setTimeout(() => target.remove(), speed + 300);
      }

      function bonusResultSpeech() {
        if (state.bonusHits > 60) return "Hết giờ rồi. Bi và Xoài nhận rất nhiều sao.";
        return `Hết giờ rồi. Bi và Xoài nhận ${state.bonusHits} sao.`;
      }

      function finishBonusGame() {
        clearBonusTimers();
        document.querySelectorAll(".bonus-target").forEach((target) => target.remove());
        const feedback = document.getElementById("bonus-feedback");
        if (feedback) feedback.textContent = `Hết giờ rồi! Bi và Xoài nhận ${state.bonusHits} sao.`;
        document.getElementById("bonus-again").disabled = !canPlayBonus();
        document.getElementById("bonus-menu").disabled = !canPlayBonus();
        speak(bonusResultSpeech());
      }

      soundButton.addEventListener("click", enableSound);
      renderHome();
    </script>
  </body>
</html>
